name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"

      # The @tootallnate/zstd-wasm tests cross-validate the WASM
      # encoder/decoder against the system `zstd` binary.
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Native WASM build steps fall back to the checked-in binaries
      # when the toolchain (wasi-sdk, cargo, …) is absent, so a plain
      # build works here without installing wasi-sdk.
      - name: Build Packages
        run: pnpm build

      - name: Run Tests
        run: pnpm test
